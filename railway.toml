# One Source — single Railway service (shop + API + admin)
# https://docs.railway.com/guides/config-as-code

[build]
buildCommand = "npm ci && npm run build && npm ci --prefix server"

[deploy]
startCommand = "npm start --prefix server"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
