<!doctype html>
<html lang="en-UG">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>One Source — Fresh produce for Uganda</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(165deg, #2e5e4a 0%, #244a3b 55%, #1c1c1c 100%);
      }
      #app-loader .app-loader-inner {
        width: min(12rem, 70vw);
      }
      #app-loader .app-loader-bar {
        height: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        overflow: hidden;
      }
      #app-loader .app-loader-bar span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: linear-gradient(90deg, #b4cf5a, #f0c947);
        animation: app-loader-slide 1.1s ease-in-out infinite;
      }
      @keyframes app-loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div class="app-loader-inner">
        <div class="app-loader-bar"><span></span></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
